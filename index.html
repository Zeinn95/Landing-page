<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing-Page</title>
    <title>Calmdry</title>
    <link rel="stylesheet" href="./css/main.css">
    <link rel="stylesheet" href="./css/media.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">

<body>

  <header>
    <nav class="navbar">

        <div class="logo"><img src="assets/images/Logo.svg" width="130px" alt=""></div>

      <div class="nav-container">

        <ul class="nav-links">
            <li><a href="#">About us</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Use Cases</a></li>
            <li><a href="#">Pricing</a></li>
            <li><a href="#">Blog</a></li>

        <button class="nav-btn">Request a quote</button>

      <div class="burger">
        <img src="assets/images/burger-menu.svg" width="25px" alt="">

      <div class="close">
        <img src="assets/images/close-icon.svg" width="33px" alt="">

  </header>

  <main>
    <div class="welcome-block">

      <div>
        <h1 class="welcome-h1">Navigating the digital landscape for success</h1>
      </div>

      <div class="main-illustration">
        <img src="/assets/images/Illustration.png" width="300px" alt="">

        <p>Our digital marketing agency helps businesses grow and succeed online through a range of services including SEO, PPC, social media marketing, and content creation.</p>
      </div>
    </div>

<script src="main.js"></script>
