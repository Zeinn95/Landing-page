<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Landing-Page</title>
      <link rel="stylesheet" href="./css/main.css">
      <link rel="stylesheet" href="./css/media.css">
  </head>

  <body>
    <header class="header">

      <div class="logo">
          <img src="assets/images/Logo.svg" width="130px" alt="Logo">
      </div>

      <nav>
        <ul class="nav-links">
          <li><a href="#">About us</a></li>
          <li><a href="#">Services</a></li>
          <li><a href="#">Use Cases</a></li>
          <li><a href="#">Pricing</a></li>
          <li><a href="#">Blog</a></li>
        </ul>
      </nav>

      <div class="menu">
        <img src="assets/images/burger-menu.svg" width="25px" alt="Menu">
        <img class="close-menu" src="assets/images/close-icon.svg" width="33px" alt="Close">
      </div>

    </header>

    <main>
      <section class="hero-container">
        <div class="hero-block">
          <div>
            <h1 class="hero-h1">Navigating the digital landscape for success</h1>
          </div>

          <div class="hero-illustration">
            <img src="assets/images/Illustration.png" width="295px" alt="Illustration">
          </div>

          <div class="hero-p">
            Our digital marketing agency helps businesses
            grow and succeed online through a range of
            services including SEO, PPC, social media
            marketing, and content creation.
          </div>
        </div>

        <div class="hero-btn-div">
          <button class="hero-btn">Book a consultation</button>
        </div>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
